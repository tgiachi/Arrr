name: CI

on:
  pull_request:
    branches: [ main, develop ]

permissions:
  contents: read

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Pack Arrr.Core into local feed
        run: |
          mkdir -p local-packages
          dotnet pack src/Arrr.Core/Arrr.Core.csproj -c Release -o ./local-packages

      - name: Restore
        run: |
          dotnet restore src/Arrr.Service/Arrr.Service.csproj
          dotnet restore tests/Arrr.Tests/Arrr.Tests.csproj

      - name: Build
        run: |
          dotnet build src/Arrr.Service/Arrr.Service.csproj --no-restore -c Release
          dotnet build tests/Arrr.Tests/Arrr.Tests.csproj --no-restore -c Release

      - name: Test
        run: dotnet test tests/Arrr.Tests/Arrr.Tests.csproj -c Release --no-build --filter "Category!=Integration" --logger "console;verbosity=normal"
