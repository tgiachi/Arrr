name: Publish to NuGet

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Restore & build Arrr.Core
        run: |
          dotnet restore src/Arrr.Core/Arrr.Core.csproj
          dotnet build src/Arrr.Core/Arrr.Core.csproj -c Release --no-restore

      - name: Pack Arrr.Core to local feed
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          mkdir -p local-packages
          dotnet pack src/Arrr.Core/Arrr.Core.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./local-packages

      - name: Restore & build plugins
        run: |
          dotnet restore plugins/RssPlugin/RssPlugin.csproj
          dotnet restore plugins/ImapPlugin/ImapPlugin.csproj
          dotnet build plugins/RssPlugin/RssPlugin.csproj -c Release --no-restore
          dotnet build plugins/ImapPlugin/ImapPlugin.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/Arrr.Tests/Arrr.Tests.csproj -c Release --filter "Category!=Integration"

      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack src/Arrr.Core/Arrr.Core.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack templates/Arrr.Templates.csproj \
            -c Release \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/RssPlugin/RssPlugin.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/ImapPlugin/ImapPlugin.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./nupkg/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate || true
