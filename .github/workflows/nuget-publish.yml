name: Publish to NuGet

on:
  push:
    tags:
      - "v*"

jobs:
  publish:
    name: Build & Publish NuGet packages
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build whatsapp-bridge (all platforms)
        working-directory: plugins/WhatsAppPlugin/bridge
        run: |
          mkdir -p linux-x64 linux-arm64 win-x64 osx-x64 osx-arm64
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o linux-x64/whatsapp-bridge   .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -o linux-arm64/whatsapp-bridge  .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o win-x64/whatsapp-bridge.exe  .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o osx-x64/whatsapp-bridge      .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o osx-arm64/whatsapp-bridge    .

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Create local NuGet feed directory
        run: mkdir -p local-packages

      - name: Restore & build Arrr.Core
        run: |
          dotnet restore src/Arrr.Core/Arrr.Core.csproj
          dotnet build src/Arrr.Core/Arrr.Core.csproj -c Release --no-restore

      - name: Pack Arrr.Core to local feed
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack src/Arrr.Core/Arrr.Core.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./local-packages

      - name: Restore & build plugins
        run: |
          dotnet restore plugins/RssPlugin/RssPlugin.csproj
          dotnet restore plugins/ImapPlugin/ImapPlugin.csproj
          dotnet restore plugins/TelegramBotSink/TelegramBotSink.csproj
          dotnet restore plugins/WhatsAppPlugin/WhatsAppPlugin.csproj
          dotnet restore plugins/WebSocketSink/WebSocketSink.csproj
          dotnet restore plugins/SignalRSink/SignalRSink.csproj
          dotnet build plugins/RssPlugin/RssPlugin.csproj -c Release --no-restore
          dotnet build plugins/ImapPlugin/ImapPlugin.csproj -c Release --no-restore
          dotnet build plugins/TelegramBotSink/TelegramBotSink.csproj -c Release --no-restore
          dotnet build plugins/WhatsAppPlugin/WhatsAppPlugin.csproj -c Release --no-restore
          dotnet build plugins/WebSocketSink/WebSocketSink.csproj -c Release --no-restore
          dotnet build plugins/SignalRSink/SignalRSink.csproj -c Release --no-restore

      - name: Test
        run: dotnet test tests/Arrr.Tests/Arrr.Tests.csproj -c Release --filter "Category!=Integration"

      - name: Pack
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          dotnet pack src/Arrr.Core/Arrr.Core.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack templates/Arrr.Templates.csproj \
            -c Release \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/RssPlugin/RssPlugin.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/ImapPlugin/ImapPlugin.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/TelegramBotSink/TelegramBotSink.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/WhatsAppPlugin/WhatsAppPlugin.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/WebSocketSink/WebSocketSink.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg
          dotnet pack plugins/SignalRSink/SignalRSink.csproj \
            -c Release \
            --no-build \
            -p:Version="$VERSION" \
            -o ./nupkg

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./nupkg/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate || true
