name: Publish to NuGet

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version to publish (without v prefix, e.g. 1.6.0)"
        required: true

jobs:
  publish:
    name: Build & Publish NuGet packages
    runs-on: ubuntu-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.x"

      - name: Build whatsapp-bridge (all platforms)
        working-directory: plugins/Arrr.Plugin.WhatsApp/bridge
        run: |
          mkdir -p linux-x64 linux-arm64 win-x64 osx-x64 osx-arm64
          CGO_ENABLED=0 GOOS=linux   GOARCH=amd64 go build -o linux-x64/whatsapp-bridge   .
          CGO_ENABLED=0 GOOS=linux   GOARCH=arm64 go build -o linux-arm64/whatsapp-bridge  .
          CGO_ENABLED=0 GOOS=windows GOARCH=amd64 go build -o win-x64/whatsapp-bridge.exe  .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=amd64 go build -o osx-x64/whatsapp-bridge      .
          CGO_ENABLED=0 GOOS=darwin  GOARCH=arm64 go build -o osx-arm64/whatsapp-bridge    .

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Create local NuGet feed directory
        run: mkdir -p local-packages

      - name: Restore & build Arrr.Core
        run: |
          dotnet restore src/Arrr.Core/Arrr.Core.csproj
          dotnet build src/Arrr.Core/Arrr.Core.csproj -c Release --no-restore

      - name: Pack Arrr.Core to local feed
        run: |
          VER="${VERSION#v}"
          dotnet pack src/Arrr.Core/Arrr.Core.csproj \
            -c Release \
            --no-build \
            -p:Version="$VER" \
            -o ./local-packages

      - name: Restore & build plugins
        run: |
          for plugin in $(find plugins -name "*.csproj"); do
            if grep -q "windows" "$plugin"; then
              echo "Skipping Windows-only plugin on Linux: $plugin"
              continue
            fi
            dotnet restore "$plugin"
            dotnet build "$plugin" -c Release --no-restore
          done

      - name: Test
        run: dotnet test tests/Arrr.Tests/Arrr.Tests.csproj -c Release --filter "Category!=Integration"

      - name: Pack
        run: |
          VER="${VERSION#v}"
          dotnet pack src/Arrr.Core/Arrr.Core.csproj \
            -c Release \
            --no-build \
            -p:Version="$VER" \
            -o ./nupkg
          dotnet pack templates/Arrr.Templates.csproj \
            -c Release \
            -p:Version="$VER" \
            -o ./nupkg
          for plugin in $(find plugins -name "*.csproj"); do
            if grep -q "windows" "$plugin"; then
              echo "Skipping Windows-only plugin on Linux: $plugin"
              continue
            fi
            dotnet pack "$plugin" -c Release --no-build -p:Version="$VER" -o ./nupkg
          done

      - name: Push to NuGet.org
        run: |
          dotnet nuget push ./nupkg/*.nupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate
          dotnet nuget push ./nupkg/*.snupkg \
            --api-key ${{ secrets.NUGET_API_KEY }} \
            --source https://api.nuget.org/v3/index.json \
            --skip-duplicate || true

  publish-windows:
    name: Build & Publish Windows-only NuGet packages
    runs-on: windows-latest
    permissions:
      contents: read
    env:
      VERSION: ${{ github.event.inputs.version || github.ref_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Create local NuGet feed directory
        run: New-Item -ItemType Directory -Force local-packages

      - name: Restore & build Arrr.Core
        run: |
          dotnet restore src/Arrr.Core/Arrr.Core.csproj
          dotnet build   src/Arrr.Core/Arrr.Core.csproj -c Release --no-restore

      - name: Pack Arrr.Core to local feed
        run: |
          $VER = "$env:VERSION".TrimStart('v')
          dotnet pack src/Arrr.Core/Arrr.Core.csproj -c Release --no-build -p:Version="$VER" -o ./local-packages

      - name: Restore & build Windows plugins
        run: |
          foreach ($plugin in Get-ChildItem -Path plugins -Recurse -Filter "*.csproj") {
            if (Select-String -Path $plugin.FullName -Pattern "windows" -Quiet) {
              dotnet restore $plugin.FullName
              dotnet build   $plugin.FullName -c Release --no-restore
            }
          }

      - name: Pack Windows plugins
        run: |
          $VER = "$env:VERSION".TrimStart('v')
          New-Item -ItemType Directory -Force nupkg
          foreach ($plugin in Get-ChildItem -Path plugins -Recurse -Filter "*.csproj") {
            if (Select-String -Path $plugin.FullName -Pattern "windows" -Quiet) {
              dotnet pack $plugin.FullName -c Release --no-build -p:Version="$VER" -o ./nupkg
            }
          }

      - name: Push to NuGet.org
        run: |
          dotnet nuget push "./nupkg/*.nupkg" `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
          dotnet nuget push "./nupkg/*.snupkg" `
            --api-key ${{ secrets.NUGET_API_KEY }} `
            --source https://api.nuget.org/v3/index.json `
            --skip-duplicate
