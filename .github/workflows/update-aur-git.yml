name: Update AUR arrr-git package

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  update-aur-git:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Push arrr-git to AUR
        env:
          AUR_SSH_KEY: ${{ secrets.AUR_SSH_KEY }}
        run: bash scripts/update-aur-git.sh
